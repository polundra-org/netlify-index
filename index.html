<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каноничная форма</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-center items-center p-4">

    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full border border-slate-100">
        <h1 class="text-2xl font-bold text-slate-950 mb-6 text-center">Отправка формы напрямую в функцию</h1>
        
        <form action="/.netlify/functions/index" method="POST" class="space-y-4">
            <div>
                <label for="name" class="block text-sm font-medium text-slate-700 mb-1">Ваше имя</label>
                <input type="text" name="name" id="name" required 
                    class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500">
            </div>
            
            <div>
                <label for="message" class="block text-sm font-medium text-slate-700 mb-1">Сообщение</label>
                <textarea name="message" id="message" rows="3" required 
                    class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500"></textarea>
            </div>
            
            <button type="submit" 
                class="w-full bg-teal-600 hover:bg-teal-700 text-white font-medium py-2.5 px-4 rounded-lg transition-colors cursor-pointer">
                Отправить форму
            </button>
        </form>
    </div>

</body>
</html>
