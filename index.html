<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Первый Деплой на Netlify</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(15deg); }
        }
        .wave-emoji {
            display: inline-block;
            animation: wave 2s infinite ease-in-out;
            transform-origin: 70% 70%;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col justify-between">

    <header class="bg-white border-b border-slate-200">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <span class="text-xl font-bold text-teal-600">Netlify.Demo</span>
            <span class="bg-emerald-100 text-emerald-800 text-xs px-2.5 py-1 rounded-full font-semibold border border-emerald-200">
                Live Now
            </span>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-12 flex-grow flex flex-col justify-center">
        <div class="bg-white rounded-2xl shadow-xl shadow-slate-100 p-8 md:p-12 border border-slate-100">
            
            <div class="text-center mb-8">
                <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight mb-3">
                    Привет из облаков! <span class="wave-emoji">👋</span>
                </h1>
                <p class="text-slate-500 text-lg">
                    Если вы видите эту страницу, значит ваш статический деплой на <span class="font-semibold text-teal-600">Netlify</span> прошел успешно.
                </p>
            </div>

            <hr class="border-slate-100 my-6">

            <div>
                <h2 class="text-xl font-bold text-slate-900 mb-4 text-center">Проверьте, как работают формы Netlify</h2>
                
                <form name="contact" method="POST" data-netlify="true" class="space-y-4">
                    <div>
                        <label for="name" class="block text-sm font-medium text-slate-700 mb-1">Ваше имя</label>
                        <input type="text" name="name" id="name" required 
                            class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition">
                    </div>
                    
                    <div>
                        <label for="message" class="block text-sm font-medium text-slate-700 mb-1">Сообщение</label>
                        <textarea name="message" id="message" rows="3" required 
                            class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition" 
                            placeholder="Напишите что-нибудь..."></textarea>
                    </div>
                    
                    <button type="submit" 
                        class="w-full bg-teal-600 hover:bg-teal-700 text-white font-medium py-2.5 px-4 rounded-lg transition-colors shadow-md shadow-teal-100 cursor-pointer">
                        Отправить в Netlify
                    </button>
                </form>
            </div>

        </div>
    </main>

    <footer class="bg-slate-900 text-slate-400 py-6 text-center text-sm border-t border-slate-800">
        <p>© 2026 Сгенерировано специально для деплоя. Работает на чистом HTML.</p>
    </footer>

</body>
</html>
